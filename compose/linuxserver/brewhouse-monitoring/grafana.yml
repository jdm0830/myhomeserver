services:
  tilt_grafana:
    image: grafana/grafana:latest
    container_name: tilt_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - /mnt/2hd/share/docker/appdata/tilt-grafana:/var/lib/grafana
    environment:
      - TZ=${TZ}
      - GF_SECURITY_ALLOW_EMBEDDING=true

